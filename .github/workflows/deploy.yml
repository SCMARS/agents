name: Build & Push Docker image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed for GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Docker Buildx ──────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Login to GitHub Container Registry ────────────────────────────────
      # To use Docker Hub instead, swap this step for docker/login-action
      # with username/password secrets.
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Derive image name (lowercase) ─────────────────────────────────────
      - name: Set image name
        id: image
        run: |
          echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      # ── Build & push ───────────────────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          # NEXT_PUBLIC_* vars are baked in at build time
          build-args: |
            NEXT_PUBLIC_VAPI_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_VAPI_PUBLIC_KEY }}
            NEXT_PUBLIC_VAPI_ASSISTANT_ID_SALES=${{ secrets.NEXT_PUBLIC_VAPI_ASSISTANT_ID_SALES }}
            NEXT_PUBLIC_ELEVENLABS_AGENT_ID_SUPPORT=${{ secrets.NEXT_PUBLIC_ELEVENLABS_AGENT_ID_SUPPORT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
