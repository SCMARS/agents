# Production build — mirrors what deploys to Railway / Fly.io / any Docker host
# Usage: docker compose -f docker-compose.prod.yml up --build
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_PROVIDER_A_PUBLIC_KEY: ${NEXT_PUBLIC_PROVIDER_A_PUBLIC_KEY}
        NEXT_PUBLIC_PROVIDER_A_ASSISTANT_ID_SALES: ${NEXT_PUBLIC_PROVIDER_A_ASSISTANT_ID_SALES}
        NEXT_PUBLIC_PROVIDER_A_ASSISTANT_ID_UZ: ${NEXT_PUBLIC_PROVIDER_A_ASSISTANT_ID_UZ}
        NEXT_PUBLIC_PROVIDER_B_AGENT_ID_SUPPORT: ${NEXT_PUBLIC_PROVIDER_B_AGENT_ID_SUPPORT}
        NEXT_PUBLIC_PROVIDER_B_AGENT_ID_ANNA: ${NEXT_PUBLIC_PROVIDER_B_AGENT_ID_ANNA}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
